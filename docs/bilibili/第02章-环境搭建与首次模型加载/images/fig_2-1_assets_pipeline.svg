<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 380" width="100%" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#334155" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="380" fill="#FFFFFF"/>
  <text x="480" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#1E293B">assets/ 原材料仓库 —— L1 模型描述层的三级产物</text>
  <text x="480" y="70" text-anchor="middle" font-size="14" fill="#64748B">CAD 原始设计图  →  运动组网格  →  MuJoCo 物理模型</text>

  <!-- Box 1: cad -->
  <rect x="40" y="110" width="260" height="200" rx="12" fill="#EEF4F8" stroke="#0F2A4A" stroke-width="0.8"/>
  <rect x="40" y="110" width="260" height="40" rx="12" fill="#1E7296"/>
  <rect x="40" y="138" width="260" height="12" fill="#1E7296"/>
  <text x="170" y="136" text-anchor="middle" font-size="17" font-weight="600" fill="#FFFFFF">assets/cad/</text>
  <text x="60" y="182" font-size="14" font-weight="600" fill="#0F2A4A">角色：L1 输入</text>
  <text x="60" y="210" font-size="13" fill="#334155">ElectronBot.step（30.5MB）</text>
  <text x="60" y="234" font-size="13" fill="#334155">cadelectron.FCStd</text>
  <text x="60" y="266" font-size="12.5" fill="#64748B">稚晖君原版 CAD 设计图</text>
  <text x="60" y="288" font-size="12.5" fill="#64748B">24 个零件的精确尺寸/装配</text>

  <!-- Box 2: meshes -->
  <rect x="350" y="110" width="260" height="200" rx="12" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <rect x="350" y="110" width="260" height="40" rx="12" fill="#7F77DD"/>
  <rect x="350" y="138" width="260" height="12" fill="#7F77DD"/>
  <text x="480" y="136" text-anchor="middle" font-size="17" font-weight="600" fill="#FFFFFF">assets/meshes/</text>
  <text x="370" y="182" font-size="14" font-weight="600" fill="#4B44A8">角色：L1 中间产物</text>
  <text x="370" y="210" font-size="13" fill="#334155">5 个 STL 三角网格</text>
  <text x="370" y="234" font-size="13" fill="#334155">base / body / head / L·R arm</text>
  <text x="370" y="266" font-size="12.5" fill="#64748B">按「运动组」合并导出</text>
  <text x="370" y="288" font-size="12.5" fill="#64748B">每组 = 一个独立运动刚体</text>

  <!-- Box 3: mjcf -->
  <rect x="660" y="110" width="260" height="200" rx="12" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <rect x="660" y="110" width="260" height="40" rx="12" fill="#1D9E75"/>
  <rect x="660" y="138" width="260" height="12" fill="#1D9E75"/>
  <text x="790" y="136" text-anchor="middle" font-size="17" font-weight="600" fill="#FFFFFF">assets/mjcf/</text>
  <text x="680" y="182" font-size="14" font-weight="600" fill="#137A57">角色：L1 最终输出</text>
  <text x="680" y="210" font-size="13" fill="#334155">electronbot_full_arm.xml</text>
  <text x="680" y="234" font-size="13" fill="#334155">（inline mesh · ~1.7MB）</text>
  <text x="680" y="266" font-size="12.5" fill="#64748B">单文件自包含 · 零外部依赖</text>
  <text x="680" y="288" font-size="12.5" fill="#64748B">MuJoCo 可直接加载 ← 本章目标</text>

  <!-- arrows -->
  <line x1="302" y1="210" x2="348" y2="210" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="325" y="200" text-anchor="middle" font-size="11.5" fill="#334155">导出</text>
  <line x1="612" y1="210" x2="658" y2="210" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="635" y="200" text-anchor="middle" font-size="11.5" fill="#334155">转换</text>

  <text x="480" y="352" text-anchor="middle" font-size="12" fill="#94A3B8">24 个 CAD 零件 → 5 个运动组 STL：相邻无相对运动的零件在物理上固连，不必独立建模（详见第三章）</text>
</svg>
