<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 360" width="100%" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#2563EB" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="360" fill="#FFFFFF"/>
  <text x="480" y="42" text-anchor="middle" font-size="24" font-weight="600" fill="#1E293B">6 步搭建流程 —— 逐行可验证</text>

  <!-- Row1 step1 -->
  <rect x="40" y="80" width="260" height="90" rx="10" fill="#F5F8FE" stroke="#2563EB" stroke-width="0.9"/>
  <circle cx="66" cy="106" r="13" fill="#2563EB"/><text x="66" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">1</text>
  <text x="88" y="111" font-size="14.5" font-weight="600" fill="#1E293B">确认 Python 版本</text>
  <text x="60" y="140" font-size="12" fill="#475569" font-family="monospace">python3 --version</text>
  <text x="60" y="160" font-size="11.5" fill="#94A3B8">→ Python 3.11.x</text>

  <!-- step2 -->
  <rect x="350" y="80" width="260" height="90" rx="10" fill="#F5F8FE" stroke="#2563EB" stroke-width="0.9"/>
  <circle cx="376" cy="106" r="13" fill="#2563EB"/><text x="376" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">2</text>
  <text x="398" y="111" font-size="14.5" font-weight="600" fill="#1E293B">创建 venv 环境</text>
  <text x="370" y="140" font-size="12" fill="#475569" font-family="monospace">python3 -m venv .venv</text>
  <text x="370" y="160" font-size="11.5" fill="#94A3B8">source .venv/bin/activate</text>

  <!-- step3 -->
  <rect x="660" y="80" width="260" height="90" rx="10" fill="#F5F8FE" stroke="#2563EB" stroke-width="0.9"/>
  <circle cx="686" cy="106" r="13" fill="#2563EB"/><text x="686" y="111" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">3</text>
  <text x="708" y="111" font-size="14.5" font-weight="600" fill="#1E293B">安装核心依赖</text>
  <text x="680" y="140" font-size="12" fill="#475569" font-family="monospace">pip install mujoco</text>
  <text x="680" y="160" font-size="11.5" fill="#94A3B8">gymnasium numpy scipy ...</text>

  <!-- Row2 step4 (under step3) -->
  <rect x="660" y="230" width="260" height="90" rx="10" fill="#F5F8FE" stroke="#2563EB" stroke-width="0.9"/>
  <circle cx="686" cy="256" r="13" fill="#2563EB"/><text x="686" y="261" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">4</text>
  <text x="708" y="261" font-size="14.5" font-weight="600" fill="#1E293B">验证 MuJoCo 导入</text>
  <text x="680" y="290" font-size="12" fill="#475569" font-family="monospace">import mujoco</text>
  <text x="680" y="310" font-size="11.5" fill="#94A3B8">→ 3.2.x</text>

  <!-- step5 (under step2) -->
  <rect x="350" y="230" width="260" height="90" rx="10" fill="#F5F8FE" stroke="#2563EB" stroke-width="0.9"/>
  <circle cx="376" cy="256" r="13" fill="#2563EB"/><text x="376" y="261" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">5</text>
  <text x="398" y="261" font-size="14.5" font-weight="600" fill="#1E293B">验证 assets 完整性</text>
  <text x="370" y="290" font-size="12" fill="#475569" font-family="monospace">ls assets/mjcf/*.xml</text>
  <text x="370" y="310" font-size="11.5" fill="#94A3B8">cad / meshes / mjcf 齐全</text>

  <!-- step6 (under step1) highlight -->
  <rect x="40" y="230" width="260" height="90" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1.4"/>
  <circle cx="66" cy="256" r="13" fill="#1D9E75"/><text x="66" y="261" text-anchor="middle" font-size="14" font-weight="700" fill="#FFF">6</text>
  <text x="88" y="261" font-size="14.5" font-weight="600" fill="#137A57">加载模型 · 第一个成果</text>
  <text x="60" y="290" font-size="12" fill="#137A57" font-family="monospace">python3 -m mujoco.viewer</text>
  <text x="60" y="310" font-size="11.5" fill="#64748B">弹出银色双臂机器人窗口</text>

  <!-- arrows -->
  <line x1="302" y1="125" x2="348" y2="125" stroke="#2563EB" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="612" y1="125" x2="658" y2="125" stroke="#2563EB" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="790" y1="172" x2="790" y2="228" stroke="#2563EB" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="658" y1="275" x2="612" y2="275" stroke="#2563EB" stroke-width="1.6" marker-end="url(#ar)"/>
  <line x1="348" y1="275" x2="302" y2="275" stroke="#2563EB" stroke-width="1.6" marker-end="url(#ar)"/>
</svg>
