<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" width="100%" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif">
  <defs>
    <marker id="k" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#475569" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="960" height="500" fill="#FFFFFF"/>
  <text x="480" y="38" text-anchor="middle" font-size="23" font-weight="600" fill="#1E293B">6 关节运动学链 —— 从底座到指尖的树形结构</text>

  <!-- edges (draw before nodes) -->
  <line x1="480" y1="112" x2="480" y2="150" stroke="#475569" stroke-width="1.8" marker-end="url(#k)"/>
  <text x="492" y="136" font-size="12" fill="#334155">body_joint · 绕Z ±90° [b]</text>

  <line x1="480" y1="212" x2="160" y2="268" stroke="#475569" stroke-width="1.6" marker-end="url(#k)"/>
  <text x="250" y="238" font-size="11.5" fill="#334155">left_pitch [lp] Y ±90°</text>
  <line x1="480" y1="212" x2="480" y2="268" stroke="#475569" stroke-width="1.6" marker-end="url(#k)"/>
  <text x="492" y="248" font-size="11.5" fill="#334155">head_joint [h] Y ±15°</text>
  <line x1="480" y1="212" x2="800" y2="268" stroke="#475569" stroke-width="1.6" marker-end="url(#k)"/>
  <text x="608" y="238" font-size="11.5" fill="#334155">right_pitch [rp] Y ±90°</text>

  <line x1="160" y1="330" x2="160" y2="388" stroke="#475569" stroke-width="1.6" marker-end="url(#k)"/>
  <text x="172" y="364" font-size="11.5" fill="#334155">left_roll [lr] X ±45°</text>
  <line x1="800" y1="330" x2="800" y2="388" stroke="#475569" stroke-width="1.6" marker-end="url(#k)"/>
  <text x="812" y="364" font-size="11.5" fill="#334155">right_roll [rr] X ±45°</text>

  <!-- base_link -->
  <rect x="380" y="52" width="200" height="60" rx="10" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
  <text x="480" y="78" text-anchor="middle" font-size="15" font-weight="600" fill="#57564F">base_link</text>
  <text x="480" y="98" text-anchor="middle" font-size="12" fill="#7A7970">固定底座（不动）</text>

  <!-- body link -->
  <rect x="380" y="150" width="200" height="62" rx="10" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="480" y="176" text-anchor="middle" font-size="15" font-weight="600" fill="#1F5C9E">body link</text>
  <text x="480" y="196" text-anchor="middle" font-size="11.5" fill="#5E7794">旋转 → 头/双臂随动 · 外壳挂此</text>

  <!-- head -->
  <rect x="380" y="268" width="200" height="62" rx="10" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="480" y="294" text-anchor="middle" font-size="15" font-weight="600" fill="#4B44A8">head link</text>
  <text x="480" y="314" text-anchor="middle" font-size="11.5" fill="#6F68B0">俯仰 75°~105°（±15°）</text>

  <!-- left_pitch -->
  <rect x="60" y="268" width="200" height="62" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="160" y="294" text-anchor="middle" font-size="15" font-weight="600" fill="#137A57">left arm · pitch</text>
  <text x="160" y="314" text-anchor="middle" font-size="11.5" fill="#3E8E70">前后摆 · 外壳不动</text>

  <!-- left_roll -->
  <rect x="60" y="388" width="200" height="62" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="160" y="414" text-anchor="middle" font-size="15" font-weight="600" fill="#137A57">left arm · roll</text>
  <text x="160" y="434" text-anchor="middle" font-size="11.5" fill="#3E8E70">侧摆 · 左臂 6 零件</text>

  <!-- right_pitch -->
  <rect x="700" y="268" width="200" height="62" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="800" y="294" text-anchor="middle" font-size="15" font-weight="600" fill="#137A57">right arm · pitch</text>
  <text x="800" y="314" text-anchor="middle" font-size="11.5" fill="#3E8E70">前后摆 · 外壳不动</text>

  <!-- right_roll -->
  <rect x="700" y="388" width="200" height="62" rx="10" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="800" y="414" text-anchor="middle" font-size="15" font-weight="600" fill="#137A57">right arm · roll</text>
  <text x="800" y="434" text-anchor="middle" font-size="11.5" fill="#3E8E70">侧摆 · 右臂 7 零件</text>

  <text x="480" y="478" text-anchor="middle" font-size="12" fill="#94A3B8">验证要点：身体旋转 → 头+双臂必须随动；手臂运动 → 身体侧外壳绝不能跟随（外壳属 body link，不属 arm link）</text>
</svg>
